version: '3.8'

services:
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/mssd-mssd-backend:main
    environment:
      - SPRING_PROFILES_ACTIVE=prod
      - DB_URL=jdbc:mysql://db:3306/mssd_db
      - DB_USER=root
      - DB_PASSWORD=root
    ports:
      - "8080:8080"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/actuator/health"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2 # Auto-scaling baseline
      update_config:
        parallelism: 1
        delay: 10s
        failure_action: rollback
        monitor: 15s
      rollback_config:
        parallelism: 1
        delay: 10s
        failure_action: pause
        monitor: 15s
      restart_policy:
        condition: on-failure
        max_attempts: 3
    networks:
      - mssd-net

  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER}/mssd-mssd-frontend:main
    ports:
      - "80:80"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3
    deploy:
      replicas: 2
      update_config:
        parallelism: 1
        failure_action: rollback
      rollback_config:
        parallelism: 1
      restart_policy:
        condition: on-failure
    networks:
      - mssd-net

  db:
    image: mysql:8.0
    command: --default-authentication-plugin=mysql_native_password
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=root
      - MYSQL_DATABASE=mssd_db
    ports:
      - "3306:3306"
    volumes:
      - db_data:/var/lib/mysql
    deploy:
      replicas: 1 # Database shouldn't be scaled like stateless apps
      update_config:
        failure_action: rollback
    networks:
      - mssd-net

networks:
  mssd-net:
    driver: overlay # Required for Swarm mode

volumes:
  db_data: