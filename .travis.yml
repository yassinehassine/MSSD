language: java
jdk:
  - openjdk17

node_js:
  - '20'

# Caching speeds up builds
cache:
  npm: true
  directories:
    - $HOME/.m2
    - mssd-frontend/node_modules

services:
  - mysql
  - docker

before_install:
  # Setup Node.js
  - nvm install 20
  - nvm use 20
  - npm install -g @angular/cli
  
  # Setup MySQL database for tests
  - mysql -e 'CREATE DATABASE IF NOT EXISTS mssd_db;'

env:
  global:
    - SPRING_DATASOURCE_URL=jdbc:mysql://localhost:3306/mssd_db
    - SPRING_DATASOURCE_USERNAME=root
    - SPRING_DATASOURCE_PASSWORD=
    - SPRING_PROFILES_ACTIVE=dev

install:
  # Backend: Maven install (with flags: -B batch mode, -V show version, -DskipTests, -Dmaven.javadoc.skip)
  - cd mssd-backend && mvn install -DskipTests=true -Dmaven.javadoc.skip=true -B -V && cd ..
  
  # Frontend: npm ci (clean install from package-lock.json)
  - cd mssd-frontend && npm ci && cd ..

script:
  # Backend: Run tests with Maven (-B for batch mode)
  - cd mssd-backend && mvn test -B && cd ..
  
  # Backend: Build package
  - cd mssd-backend && mvn package -DskipTests -B && cd ..
  
  # Frontend: Lint (if available)
  - cd mssd-frontend && npm run lint --if-present && cd ..
  
  # Frontend: Production build
  - cd mssd-frontend && npm run build -- --configuration=production && cd ..

after_success:
  # Optional: Build Docker images on success
  - |
    if [ "$TRAVIS_BRANCH" = "main" ] || [ "$TRAVIS_BRANCH" = "master" ]; then
      echo "Building Docker images..."
      docker compose build
    fi

notifications:
  email:
    on_success: change
    on_failure: always

branches:
  only:
    - main
    - master
    - develop
